<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Feed cronologico do The Social Network. Sem recomendacao automatica.">
  <title>Feed | The Social Network</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <main>
    <div class="container">
      <header class="feed-header">
        <h1 class="feed-header__title">Feed</h1>
        <p class="feed-header__subtitle">Feed cronologico. Sem recomendacao automatica. O indicador publico mostra somente tendencia.</p>
      </header>

      <section id="feed-root" class="feed-list" aria-live="polite" aria-busy="true">
        <div class="skeleton-card" data-feed-skeleton>
          <div class="skeleton-line skeleton-line--short"></div>
          <div class="skeleton-line skeleton-line--title"></div>
          <div class="skeleton-line skeleton-line--long"></div>
          <div class="skeleton-line skeleton-line--medium"></div>
        </div>
        <div class="skeleton-card" data-feed-skeleton>
          <div class="skeleton-line skeleton-line--short"></div>
          <div class="skeleton-line skeleton-line--title"></div>
          <div class="skeleton-line skeleton-line--long"></div>
          <div class="skeleton-line skeleton-line--medium"></div>
        </div>
      </section>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/pages/feed.js"></script>
</body>
</html>
