<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feed | The Social Network</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <main class="page">
      <header class="card app-header">
        <div class="header-copy">
          <img src="../images/logo-transparent.png" alt="TSN" height="48" />
          <h1 class="ink-underline">Feed</h1>
          <p class="muted">Publica&ccedil;&otilde;es recentes da comunidade.</p>
          <p class="tone-note">Ordem cronol&oacute;gica.</p>
        </div>
        <nav class="row app-nav">
          <button type="button" class="nav-link" data-nav-href="./feed.html" aria-current="page">Feed</button>
          <button type="button" class="nav-link" data-nav-href="./profile.html" data-profile-link hidden>Meu perfil</button>
          <button type="button" class="nav-link" data-nav-href="./index.html" data-login-link>Entrar</button>
          <button type="button" data-open-post-modal>Novo post</button>
          <button type="button" data-logout hidden>Sair</button>
        </nav>
      </header>

      <section class="card info-strip">
        <p class="ink-underline">Feed cronol&oacute;gico</p>
        <p class="muted">
          As publica&ccedil;&otilde;es aparecem da mais recente para a mais antiga.
        </p>
        <form class="feed-search" data-feed-search-form>
          <label class="feed-search-field">
            Buscar posts
            <input
              type="search"
              name="search"
              placeholder="Busque por t&iacute;tulo, conte&uacute;do ou tag"
              maxlength="120"
              data-feed-search-input
            />
          </label>
          <div class="feed-search-actions">
            <button type="submit" data-feed-search-submit>Buscar</button>
            <button type="button" class="button-ghost" data-feed-search-reset hidden>Limpar</button>
          </div>
        </form>
      </section>

      <p class="muted status-line" data-feed-status></p>
      <div class="feed-list" data-feed-list></div>
      <div class="feed-actions">
        <button type="button" class="button-ghost" data-feed-more hidden>Carregar mais</button>
      </div>
    </main>

    <dialog class="modal" data-post-modal>
      <section class="card modal-card">
        <div class="row modal-header">
          <h2 class="ink-underline" data-post-modal-title>Publicar post</h2>
          <button type="button" class="button-ghost" data-post-modal-cancel>Fechar</button>
        </div>
        <p class="muted">Escreva com clareza e contexto.</p>
        <form data-post-modal-form>
          <label>
            T&iacute;tulo
            <input name="title" placeholder="Ex: Como organizar estudos de Node.js" required maxlength="120" />
          </label>
          <label>
            Conte&uacute;do
            <textarea
              name="content"
              rows="6"
              placeholder="Explique a ideia de forma objetiva."
              required
            ></textarea>
          </label>
          <label>
            Tags
            <input name="tags" placeholder="node, backend, estudo" />
          </label>
          <button type="submit" data-post-modal-submit>Publicar</button>
        </form>
        <p class="muted status-line" data-post-modal-status></p>
      </section>
    </dialog>
    <script type="module" src="../js/pages/feed.js"></script>
  </body>
</html>
