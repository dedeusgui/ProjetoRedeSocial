<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel de Reviews | Rede Social</title>
    <link rel="stylesheet" href="../../css/style.css" />
  </head>
  <body>
    <main class="page">
      <header class="card app-header">
        <div>
          <h1>Painel de Reviews</h1>
          <p class="muted">Area para moderadores e administradores.</p>
        </div>
        <nav class="row">
          <a href="../feed.html">Feed</a>
          <a href="../profile.html">Meu perfil</a>
          <a href="../index.html" data-login-link>Entrar</a>
          <button type="button" data-logout hidden>Sair</button>
        </nav>
      </header>

      <section class="card">
        <form data-review-form>
          <input name="postId" placeholder="Post ID" required />
          <select name="decision" required>
            <option value="approved">approved</option>
            <option value="not_relevant">not_relevant</option>
          </select>
          <textarea name="reason" rows="3" placeholder="Reason (optional)"></textarea>
          <button type="submit">Salvar review</button>
        </form>
      </section>
      <p class="muted" data-review-status></p>
    </main>
    <script type="module" src="../../js/pages/admin-reviews.js"></script>
  </body>
</html>
