<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel de Reviews | Rede Social</title>
    <link rel="stylesheet" href="../../css/style.css" />
  </head>
  <body>
    <main class="page">
      <h1>Painel de Reviews</h1>
      <section class="card">
        <form data-review-form>
          <input name="postId" placeholder="Post ID" required />
          <select name="decision" required>
            <option value="approved">approved</option>
            <option value="not_relevant">not_relevant</option>
          </select>
          <textarea name="reason" rows="3" placeholder="Reason (optional)"></textarea>
          <button type="submit">Salvar review</button>
        </form>
      </section>
      <p class="muted" data-review-status></p>
    </main>
    <script src="../../js/script.js"></script>
  </body>
</html>
