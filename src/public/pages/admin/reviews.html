<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Review Panel | The Social Network</title>
    <link rel="stylesheet" href="../../css/style.css" />
  </head>
  <body>
    <main class="page">
      <header class="card app-header">
        <div class="header-copy">
          <img src="../../images/logo-transparent.png" alt="TSN" height="48" />
          <h1 class="ink-underline">Review Panel</h1>
          <p class="muted">Review operations and moderator management.</p>
        </div>
        <nav class="row app-nav">
          <button type="button" class="nav-link" data-nav-href="../feed.html">Feed</button>
          <button type="button" class="nav-link" data-nav-href="../profile.html" data-profile-link hidden>My profile</button>
          <button type="button" class="nav-link" data-nav-href="../index.html" data-login-link>Sign in</button>
          <button type="button" data-logout hidden>Sign out</button>
        </nav>
      </header>

      <section class="card admin-panel" data-admin-panel hidden>
        <div class="row">
          <h2 class="ink-underline">Moderator management</h2>
          <button type="button" class="button-ghost" data-admin-refresh>Refresh</button>
        </div>
        <p class="muted" data-admin-requirements></p>

        <section class="admin-panel-section">
          <h3>Eligible users</h3>
          <div class="admin-user-grid" data-eligible-list></div>
        </section>

        <section class="admin-panel-section">
          <h3>Current moderators</h3>
          <div class="admin-user-grid" data-moderators-list></div>
        </section>
      </section>
      <p class="muted status-line" data-review-status></p>
    </main>
    <script type="module" src="../../js/pages/admin-reviews.js"></script>
  </body>
</html>
