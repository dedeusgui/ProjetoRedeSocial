<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post | Rede Social</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <main class="page">
      <h1>Post</h1>
      <p class="muted" data-post-status></p>
      <div data-post-view></div>

      <section class="card">
        <h2>Add comment</h2>
        <form data-comment-form>
          <textarea name="content" rows="4" placeholder="Comment" required></textarea>
          <button type="submit">Send</button>
        </form>
      </section>
    </main>
    <script src="../js/script.js"></script>
  </body>
</html>
