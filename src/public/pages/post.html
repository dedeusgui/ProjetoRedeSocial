<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post | The Social Network</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <main class="page">
      <header class="card app-header">
        <div class="header-copy">
          <h1 class="ink-underline">Discuss&atilde;o de post</h1>
          <p class="muted">Aqui o conte&uacute;do fala por si. Coment&aacute;rios para aprofundar a ideia.</p>
          <p class="tone-note">Zero influ&ecirc;ncia, s&oacute; contexto.</p>
        </div>
        <nav class="row app-nav">
          <a class="nav-link" href="./feed.html">Feed</a>
          <a class="nav-link" href="./profile.html">Meu perfil</a>
          <a class="nav-link" href="./index.html" data-login-link>Entrar</a>
          <button type="button" class="button-ghost" data-motion-toggle>Movimento: ligado</button>
          <button type="button" data-logout hidden>Sair</button>
        </nav>
      </header>

      <p class="muted status-line" data-post-status></p>
      <div data-post-view></div>

      <section class="card moderation-panel" data-review-panel hidden>
        <h2 class="ink-underline">Revis&atilde;o de modera&ccedil;&atilde;o</h2>
        <p class="muted">Dispon&iacute;vel apenas para moderadores e administradores.</p>
        <div class="review-actions">
          <button type="button" class="button-approve" data-review-approve>Aprovar</button>
          <button type="button" class="button-reject" data-review-reject>N&atilde;o relevante</button>
        </div>
        <label>
          Motivo opcional
          <textarea data-review-reason rows="3" placeholder="Contexto adicional (opcional)"></textarea>
        </label>
        <p class="muted status-line" data-review-status></p>
      </section>

      <section class="card">
        <h2 class="ink-underline">Adicionar coment&aacute;rio</h2>
        <p class="muted">Contribua com contexto, explica&ccedil;&atilde;o ou contraponto objetivo.</p>
        <form data-comment-form>
          <label>
            Coment&aacute;rio
            <textarea name="content" rows="4" placeholder="Seu coment&aacute;rio" required></textarea>
          </label>
          <button type="submit">Enviar coment&aacute;rio</button>
        </form>
        <p class="muted status-line" data-comment-help></p>
      </section>
    </main>
    <script type="module" src="../js/pages/post.js"></script>
  </body>
</html>
